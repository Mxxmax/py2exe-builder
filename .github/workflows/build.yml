# GitHub Actions: Auto-build .exe from .py via PyInstaller
name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: List workspace files
        run: Get-ChildItem -Recurse -File

      - name: Install dependencies
        run: |
          pip install pyinstaller
          if (Test-Path "requirements.txt") { pip install -r requirements.txt }

      - name: Build EXE
        run: |
          $files = @(Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "*.py" -Recurse | Where-Object { $_.Name -ne "setup.py" })
          Write-Host "Found $($files.Count) Python files"
          foreach ($f in $files) {
            $name = [System.IO.Path]::GetFileNameWithoutExtension($f.Name)
            Write-Host "Building $($f.Name) -> $name.exe"
            pyinstaller --onefile --console --name "$name" "$($f.FullName)" 2>&1
          }

      - name: Check dist folder
        run: |
          if (Test-Path "dist") { Get-ChildItem dist } else { Write-Host "No dist folder" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-exe
          path: dist/*.exe
          if-no-files-found: error
